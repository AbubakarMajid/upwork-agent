# Search queries run in parallel against Upwork's job feed each cycle (one search
# per keyword). Keep these broad-but-relevant; the LLM scope filter does the
# nuanced relevance judgement on each returned job's description.
search_keywords:
  - "AI agent"
  - "LangChain"
  - "LangGraph"
  - "RAG chatbot"
  - "LLM"
  - "MCP server"
  - "AI automation"
  - "n8n"
  - "machine learning"
  - "Next.js"
  - "React"
  - "FastAPI"
  - "web scraping"

# Incremental fetch window. Each cycle pages recency-sorted results back to
# (now - fetch_lookback_minutes) by publishTime, then stops. Keep this WIDER than
# your poll interval (POLL_INTERVAL_SECONDS, default 300s / 5 min) so a late or
# failed run self-heals next cycle; the seen-jobs DB dedups the overlap so nothing
# is sent twice. e.g. 5-min poll + 30-min window tolerates ~25 min of missed runs.
fetch_lookback_minutes: 50

# Pipeline concurrency knobs.
browser_pool_size: 2          # parallel Chrome instances (captcha click still serialized)
max_pipeline_concurrency: 6   # concurrent per-job pipeline tasks
captcha_lock_timeout_seconds: 60  # max wait for the captcha-click lock before failing that job
                                   # instead of blocking every other job forever (see browser_fetcher.py)
client_panel_wait_seconds: 30     # hard load timeout: max wait for the "About the client" panel
                                   # (Vue-hydrated after the job body) to render. If it never appears
                                   # (page cleared Cloudflare but content never loaded), the job is
                                   # abandoned so the pooled browser is freed for the next job. Too
                                   # short -> false "client has no prior hires" rejects on slow loads.

# Browser visibility. headless removes the Chrome windows. On Linux set both
# browser_headless + browser_xvfb true so the captcha solve still works on a
# virtual display. On macOS there is no xvfb - headless breaks the captcha click,
# so leave headless false there (only browser_pool_size windows open, reused).
browser_headless: false
browser_xvfb: false

