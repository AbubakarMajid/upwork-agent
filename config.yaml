proposal_style:
  general_role_job:
    description: "Jobs phrased as a role/title, e.g. 'Senior AI Engineer', 'Next.js Developer'"
    structure: "Lead with relevant past work/experience that matches the role title."
  specific_project_job:
    description: "Jobs describing a specific project, product, or problem to solve"
    structure: "Solution -> Tech Stack -> Relevant Work. Briefly propose an approach to their stated problem, name the tech stack to be used, then back it with a matching portfolio example."

# Reference proposals used to anchor writing tone, depth, and structure.
# The LLM is told NOT to copy these - they are style guides only.
