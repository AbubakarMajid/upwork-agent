# Hard acceptance gates (all must pass - first failure rejects the job) plus
# weights for scoring jobs that pass. See scorer.py for the exact gate order.
scoring:
  max_job_age_hours: 48              # reject jobs posted more than this many hours ago
  min_pay_rate_usd_per_hr: 8
  min_fixed_price_usd: 50
  reject_if_interviewing: true       # reject if client is already interviewing someone
  reject_if_freelancers_invited: true  # reject if client already invited other freelancers
  reject_if_no_hires: true           # reject if client has zero prior hires on Upwork
  reject_countries: ["India", "Israel"]
  max_proposal_count: 15             # hard reject if proposal count tier exceeds this; also scoring weight (fewer is better)

freelancer_profile:
  title: "AI Full Stack Developer | GenAI, SaaS, Agentic AI, MVP Expert"
  badges: ["Top Rated", "100% Job Success Score"]
  years_experience: 3
  projects_delivered: 20
  hourly_rate_usd: 20
  bidding_rule: >
    Max rate is $20/hr. If the client's posted hourly rate is at or below $20/hr, match it
    (e.g. a $10/hr job gets a $10/hr bid). If their posted rate is above $20/hr, bid
    competitively between $15-20/hr rather than going to the full ceiling. For fixed-price
    jobs, bid within the client's stated budget - at or under it if reasonable, competitively
    rather than over it if their budget is tight.
